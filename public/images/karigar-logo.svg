<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Karigar Logo: Modern K Design -->
  <!-- White background -->
  <rect width="64" height="64" fill="#FFFFFF" rx="8"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="kGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B21A8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- K Shape using simpler geometry -->
  <!-- Vertical stroke on left -->
  <rect x="12" y="10" width="12" height="44" fill="url(#kGradient)" rx="2"/>
  
  <!-- Top right diagonal stroke -->
  <rect x="24" y="10" width="20" height="10" fill="url(#kGradient)" transform="rotate(30 34 15)" rx="1"/>
  
  <!-- Bottom right diagonal stroke -->
  <rect x="24" y="32" width="20" height="10" fill="url(#kGradient)" transform="rotate(-30 34 37)" rx="1"/>
</svg>
